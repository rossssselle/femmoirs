version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: femmoirs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: femmoirs
      POSTGRES_PASSWORD: femmoirs
      POSTGRES_DB: femmoirs
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
